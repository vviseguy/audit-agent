name: understander
role: understander
model: claude-haiku-4-5-20251001
max_tokens: 1024
temperature: 0

rate_limit:
  requests_per_minute: 60
  max_calls_per_job: 500

budget:
  per_call_token_cap: 4000

prompt_cache:
  - system

system_prompt_file: prompts/understander.md

tools:
  - read_file
  - list_dir
  - grep
  - write_claude_md
  - record_journal

output_schema: schemas/annotation.schema.json
